version: '3.8'
services:
  api:
    build: .
    container_name: avatar_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - db
  worker:
    build: .
    container_name: avatar_worker
    command: celery -A app.workers.celery worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - db
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: avatar_db
    ports:
      - "5432:5432"
