version: '3.9'

services:
  api:
    build: .
    container_name: avatar_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /tmp:/tmp
    env_file:
      - .env
    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: avatar_worker
    command: celery -A app.workers.celery worker --loglevel=info
    volumes:
      - .:/app
      - /tmp:/tmp
    env_file:
      - .env
    depends_on:
      - api
      - db
      - redis

  db:
    image: mysql:8.0
    container_name: avatar_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: avatarai
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:6.2
    container_name: avatar_redis
    ports:
      - "6379:6379"

volumes:
  db_data:
